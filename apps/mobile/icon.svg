<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Gradient Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <!-- Money Gradient -->
    <linearGradient id="money" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>

  <!-- Rounded Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Chart Bars -->
  <rect x="260" y="540" width="80" height="180" rx="20" fill="url(#money)"/>
  <rect x="400" y="440" width="80" height="280" rx="20" fill="url(#money)"/>
  <rect x="540" y="360" width="80" height="360" rx="20" fill="url(#money)"/>

  <!-- Up Arrow -->
  <path d="M300 400 L512 240 L724 400" stroke="#22c55e" stroke-width="40" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>