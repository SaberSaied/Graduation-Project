name: Finance_Manager
description: "Personal Finance & Savings Mobile App"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  fl_chart: ^0.70.2

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^10.0.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3

  # Auth
  google_sign_in: ^6.2.2

  # Formatting
  intl: ^0.20.2

  # Connectivity
  connectivity_plus: ^6.1.4

  # AI Chat rendering
  flutter_markdown: ^0.7.6+2
  firebase_core: ^4.7.0
  image_picker: ^1.2.1
  record: ^6.1.0
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0f172a"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
